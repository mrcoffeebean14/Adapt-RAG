# Full local stack: backend + frontend (built from the shared Dockerfile) plus
# Qdrant and MongoDB (official images). `docker compose up --build` runs it all.
#
# Secrets (GROQ_API_KEY, TAVILY_API_KEY) come from .env via env_file. The
# service-to-service URLs are overridden here to the compose network names,
# which take precedence over the localhost values in .env.
services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    command: [".venv/bin/uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - qdrant

  frontend:
    build: .
    command: [".venv/bin/streamlit", "run", "streamlit_app/home.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.headless=true"]
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  qdrant_data:
  mongo_data:
